title: "Research Data Hub"
name: "Her Name"
email: "her.email@institution.edu"
description: "Open datasets for research"
url: "https://username.github.io"
baseurl: ""

# SEO improvements
lang: "en-US"
locale: "en-US"

# Theme
remote_theme: "mmistakes/minimal-mistakes@4.24.0"

# Minimal Mistakes settings
minimal_mistakes_skin: "default" # or "air", "aqua", "contrast", "dark", "dirt", "neon", "mint", "plum", "sunrise"

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-include-cache

# Site settings
markdown: kramdown
paginate: 5
paginate_path: "/page:num/"

# Collections
collections:
  pages:
    output: true
    permalink: /:path/
  publications:
    output: true
    permalink: /publications/:name/
  research:
    output: true
    permalink: /research/:name/

include:
  - _pages

# Author info (improved)
author:
  name: "Pamela Vinueza"
  avatar: "/assets/images/espoch.jpeg"
  bio: "Veterinary"
  location: "Ecuador"
  links:
    - label: "Email"
      icon: "fas fa-envelope"
      url: "mailto:pvinuezavet@gmail.com"  # Added mailto:
    - label: "ResearchGate"
      icon: "fab fa-researchgate"
      url: "https://www.researchgate.net/profile/Marlon-Calispa"
    - label: "Google Scholar"
      icon: "fas fa-graduation-cap"
      url: "https://scholar.google.com/citations?user=7LHTKQgAAAAJ&hl=es"  # Add if you have one
    - label: "Instagram"
      icon: "fab fa-instagram"
      url: "https://www.instagram.com/theandeanmapper/"

# Default front matter
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: research
    values:
      layout: single
      author_profile: true

# Exclude from processing
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/

# SEO and social
social:
  type: Person
  name: Marlon Calispa
  links:
    - "https://www.researchgate.net/profile/Pamela-Vinueza"
