title: "Research Data Hub"
name: "Her Name"
email: "her.email@institution.edu"
description: "Open datasets for research"
url: "https://username.github.io"
baseurl: ""

remote_theme: "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin: "default"

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-include-cache

markdown: kramdown

# CRITICAL: This creates the navigation menu
header_pages:
  - about.md
  - datasets.md
  - guide.md
  - publications.md

include:
  - _pages

author:
  name: "Her Full Name"
  bio: "Researcher"
  location: "Institution"
  links:
    - label: "Email"
      icon: "fas fa-envelope"
      url: "mailto:her.email@institution.edu"

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
